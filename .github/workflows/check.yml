name: Check appointments

on:
  schedule:
    # Every 10 minutes. NOTE: GitHub Actions cron is best-effort; actual runs
    # may be delayed by 5-30 minutes during high load. This is unavoidable on
    # the free tier. For more precise timing, run on a dedicated server.
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      only:
        description: "Only check specific sites (comma-separated, no .yaml). Empty = all."
        required: false
        default: ""

# Allow this workflow to push state updates back to the repo
permissions:
  contents: write

# Don't queue overlapping runs — if the previous one is still running, skip
concurrency:
  group: check-appointments
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need write access for the commit-state step
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "${{ inputs.only }}" ]; then
            python checker.py --only $(echo "${{ inputs.only }}" | tr ',' ' ')
          else
            python checker.py
          fi

      - name: Commit state changes
        if: always()  # commit even if checker had partial failures
        run: |
          git config user.name  "afspraak-watcher[bot]"
          git config user.email "afspraak-watcher@users.noreply.github.com"
          if [ -n "$(git status --porcelain state/)" ]; then
            git add state/
            git commit -m "state: update [skip ci]" || true
            # Retry-push with rebase to handle concurrent runs racing on state
            for i in 1 2 3; do
              git pull --rebase origin "${GITHUB_REF_NAME}" && git push && break
              sleep $((i * 3))
            done
          else
            echo "No state changes to commit."
          fi
